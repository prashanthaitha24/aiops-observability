apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-detector-config
  namespace: aiops
data:
  PROMETHEUS_BASE_URL: "http://prometheus.otel-demo.svc.cluster.local:9090"
  POLL_INTERVAL_SECONDS: "30"
  ANOMALY_THRESHOLD: "0.70"
  LOG_LEVEL: "INFO"
  EXPORTER_ENABLED: "true"
  EXPORTER_PORT: "8001"
  EXPORTER_BIND_HOST: "0.0.0.0"
